{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASEL - Practical and Scientific Engineering - Liberia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* NAVBAR STYLING */
        .navbar {
            background-color: #000000 !important;
            border-bottom: 1px solid #1a1a1a;
            padding: 20px 0;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffcc00 !important;
            font-size: 1.15rem;
        }
        .nav-link {
            color: #ffcc00 !important;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .nav-link:hover {
            color: #ffffff !important;
        }
        .btn-login {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            font-weight: 600;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: #ffcc00;
            color: #000000;
            border-color: #ffcc00;
        }

        /* HERO STAGE (Layers the graphic logo OVER the background slideshow) */
        .hero-stage {
            position: relative;
            width: 100%;
            height: 55vh;
            overflow: hidden;
            border-bottom: 2px solid #221111;
        }

        /* Background Carousel Layer */
        .hero-carousel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .hero-carousel .carousel-inner,
        .hero-carousel .carousel-item,
        .hero-carousel .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Foreground Overlay Tint & Central Alignment Center */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45); 
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PREMIUM GOLD METALLIC FILTER + EDGE GLOW AURA */
        .main-logo {
            max-width: 480px;
            width: 100%;
            height: auto;
            /* Shifts white PNG to premium structural gold and projects glowing light fields */
            filter: brightness(0.9) sepia(1) saturate(25) hue-rotate(10deg)
                    drop-shadow(0 0 15px rgba(255, 204, 0, 0.85))
                    drop-shadow(0 0 35px rgba(255, 204, 0, 0.4));
        }

        /* NORTHERN SPHERE SECTOR SECTIONS */
        .sector-title {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            letter-spacing: 4px;
            color: #444444;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .hub-card {
            background-color: #0a0a0a;
            border: 1px solid #141414;
            border-radius: 4px;
            padding: 25px 20px;
            transition: all 0.3s ease;
            position: relative;
        }
        .hub-card:hover {
            border-color: #ffcc00;
            background-color: #0f0f0f;
        }
        .hub-id {
            color: #882222;
            font-family: monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .hub-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
            color: #ffffff;
        }
        .hub-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 15px;
            height: 2px;
            background-color: #882222;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">PASEL // BASE COMMAND</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-4">
                        <a class="nav-link" href="#">System Map</a>
                    </li>
                    <li class="nav-item me-4">
                        <a class="nav-link" href="#">Mission</a>
                    </li>
                    <li class="nav-item me-4">
                        <a class="nav-link" href="#">Leadership</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-login px-4" href="/admin/">LOGIN</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero-stage">
        
        <div id="heroCarousel" class="carousel slide hero-carousel" data-bs-ride="carousel" data-bs-interval="4000">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="{% static 'images/slide1.jpg' %}" alt="PASEL Site View 1">
                </div>
                <div class="carousel-item">
                    <img src="{% static 'images/slide2.jpg' %}" alt="PASEL Site View 2">
                </div>
                <div class="carousel-item">
                    <img src="{% static 'images/slide3.jpg' %}" alt="PASEL Site View 3">
                </div>
                <div class="carousel-item">
                    <img src="{% static 'images/slide4.jpg' %}" alt="PASEL Site View 4">
                </div>
            </div>
        </div>

        <div class="hero-overlay">
            <img src="{% static 'images/logo.png' %}" alt="PASEL Gold Emblem" class="main-logo">
        </div>

    </div>

    <div class="container my-5">
        <div class="sector-title">Northern Sphere Sector</div>
        
        <div class="row g-4">
            <div class="col-6 col-md-3">
                <div class="hub-card">
                    <div class="hub-id">Hub_ID: Lib-Bom</div>
                    <h3 class="hub-name">BOMI</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="hub-card">
                    <div class="hub-id">Hub_ID: Lib-Bon</div>
                    <h3 class="hub-name">BONG</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="hub-card">
                    <div class="hub-id">Hub_ID: Lib-Gba</div>
                    <h3 class="hub-name">GBARPOLU</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="hub-card">
                    <div class="hub-id">Hub_ID: Lib-Lof</div>
                    <h3 class="hub-name">LOFA</h3>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
