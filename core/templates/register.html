{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASEL | Secure Registration</title>
    <style>
        :root { --bg: #0a0908; --primary: #72383D; --gold: #D4AF37; --text: #EFE9E1; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .register-container {
            width: 100%; max-width: 450px; background: rgba(21, 19, 18, 0.95); border: 1px solid var(--primary); padding: 3rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border-top: 5px solid var(--gold);
        }

        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 5px; text-align: center; margin-bottom: 2rem; font-weight: 300; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; color: var(--gold); }
        
        input {
            width: 100%; background: #1e1b19; border: 1px solid #3a3632; padding: 12px; color: var(--text);
            font-family: 'Inter', sans-serif; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); outline: none; background: #2a2724; }

        .submit-btn {
            width: 100%; background: var(--primary); color: var(--text); border: none; padding: 1rem;
            text-transform: uppercase; letter-spacing: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 1rem;
        }
        .submit-btn:hover { background: var(--gold); color: #000; }

        .error-msg { color: #ff4d4d; font-size: 0.8rem; margin-top: 10px; list-style: none; padding: 0; }
        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: var(--text); text-decoration: none; font-size: 0.7rem; opacity: 0.6; }
        .back-link:hover { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Access Portal</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <ul class="error-msg">
                        {% for error in field.errors %}<li>{{ error }}</li>{% endfor %}
                    </ul>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="submit-btn">Initialize Account</button>
    </form>

    <a href="{% url 'index' %}" class="back-link">← RETURN TO SYSTEM MAP</a>
</div>

</body>
</html>
